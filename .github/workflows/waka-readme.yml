name: Waka Readme

on:
  schedule:
    # Runs at 12am GMT+8
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: aldrickb/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMIT_BY_ME: True
          COMMIT_MESSAGE: "Update waka readme metrics"
          COMMIT_USERNAME: "aldrickb"
          COMMIT_EMAIL: "git@aldrickb.com"
          SHOW_PROJECTS: False
          SHOW_TIMEZONE: False
          SHOW_SHORT_INFO: False
          SHOW_LOC_CHART: False
          
